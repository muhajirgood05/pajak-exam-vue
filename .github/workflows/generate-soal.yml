name: Generate Soal Otomatis
on:
  schedule:
    - cron: '0 1 * * *' # Jalan setiap jam 8 pagi WIB (1 UTC)
  workflow_dispatch: # Memungkinkan tombol manual di GitHub

jobs:
  build:
    runs-on: ubuntu-latest
    # PENTING: Tambahkan ini agar GitHub Actions diizinkan melakukan git push
    permissions:
      contents: write
      
    steps:
      - uses: actions/checkout@v3
      
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
          
      - name: Install Dependencies
        run: npm install
          
      - name: Run Generator Script
        env:
          AI_PROVIDER: ${{ vars.AI_PROVIDER }}
          AI_MODEL: ${{ vars.AI_MODEL }}
          AI_MODELS: ${{ vars.AI_MODELS }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          OPENROUTER_SITE_URL: ${{ vars.OPENROUTER_SITE_URL }}
          OPENROUTER_APP_NAME: pajak-exam-vue
        run: node scripts/generate-soal.cjs
        timeout-minutes: 10
        
      - name: Wait before validation
        run: sleep 10
        
      - name: Run Validator Script
        env:
          AI_PROVIDER: ${{ vars.AI_PROVIDER }}
          AI_MODEL: ${{ vars.AI_MODEL }}
          AI_MODELS: ${{ vars.AI_MODELS }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          OPENROUTER_SITE_URL: ${{ vars.OPENROUTER_SITE_URL }}
          OPENROUTER_APP_NAME: pajak-exam-vue
        run: node scripts/validate-soal.cjs
        timeout-minutes: 15
          
      - name: Commit and Push
        run: |
          git config --global user.name 'Hermes AI'
          git config --global user.email 'hermes-ai@users.noreply.github.com'
          git add .
          git commit -m "feat: tambah paket soal baru oleh Hermes" || echo "No changes to commit"
          git push
