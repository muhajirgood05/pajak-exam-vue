name: Generate Soal Otomatis
on:
  schedule:
    - cron: '0 1 * * *' # Jalan setiap jam 8 pagi WIB (1 UTC)
  workflow_dispatch: # Memungkinkan tombol manual di GitHub

jobs:
  build:
    runs-on: ubuntu-latest
    # PENTING: Tambahkan ini agar GitHub Actions diizinkan melakukan git push
    permissions:
      contents: write
      
    steps:
      - uses: actions/checkout@v3
      
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
          
      - name: Install Dependencies
        run: npm install
          
      - name: Run Generator Script
        env:
          AI_API_SYSTEM: ${{ vars.AI_API_SYSTEM }}
          AI_BASE_URL: ${{ vars.AI_BASE_URL }}
          AI_ENDPOINT: ${{ vars.AI_ENDPOINT }}
          AI_MODEL: ${{ vars.AI_MODEL }}
          AI_MODEL_LIST: ${{ vars.AI_MODEL_LIST }}
          AI_AUTH_TYPE: ${{ vars.AI_AUTH_TYPE }}
          AI_AUTH_HEADER: ${{ vars.AI_AUTH_HEADER }}
          AI_API_KEY: ${{ secrets.AI_API_KEY }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          OPENROUTER_REFERER: ${{ vars.OPENROUTER_REFERER }}
          OPENROUTER_TITLE: ${{ vars.OPENROUTER_TITLE }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          KIMI_API_KEY: ${{ secrets.KIMI_API_KEY }}
          MIMO_API_KEY: ${{ secrets.MIMO_API_KEY }}
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          QWEN_API_KEY: ${{ secrets.QWEN_API_KEY }}
        run: node scripts/generate-soal.cjs
        timeout-minutes: 10
        
      - name: Wait before validation
        run: sleep 10
        
      - name: Run Validator Script
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: node scripts/validate-soal.cjs
        timeout-minutes: 15
          
      - name: Commit and Push
        run: |
          git config --global user.name 'Hermes AI'
          git config --global user.email 'hermes-ai@users.noreply.github.com'
          git add .
          git commit -m "feat: tambah paket soal baru oleh Hermes" || echo "No changes to commit"
          git push
